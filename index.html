<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<title>Sign in — Occasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
.auth-wrap{display:flex;min-height:calc(100vh - 64px);align-items:center;justify-content:center;padding:30px 20px}
.auth-card{background:#fff;max-width:420px;width:100%;padding:36px 30px;border-radius:16px;border:1px solid var(--line);box-shadow:var(--shadow)}
.auth-card h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:6px}
.auth-card .sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:22px}
.auth-foot{text-align:center;font-size:12px;color:var(--muted);margin-top:14px}
.auth-foot a{color:var(--c2);font-weight:600}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="brand-logo"><img src="assets/logo.png" class="logo-img" alt="Occasi"><span class="logo-text">OCCASI</span></a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your dashboard</p>

    <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••"></div>

    <button class="btn btn-grad btn-lg" id="loginBtn" style="width:100%">Sign in →</button>

    <div class="msg" id="msg"></div>

    <div class="auth-foot">
      No account yet? <a href="signup.html">Create one</a>
    </div>
  </div>
</div>

<script src="js/occasi-auth.js"></script>
<script>
function onSupabaseReady() {
  /* If already logged in, redirect to dashboard */
  supabase.auth.getUser().then(function(res) {
    if (res?.data?.user) window.location.href = "dashboard.html";
  });
}

document.getElementById("loginBtn").addEventListener("click", async function() {
  var btn = this;
  if (!supabase) return showMsg("Service unavailable. Please refresh.", true);

  var email = document.getElementById("email").value.trim();
  var pass = document.getElementById("password").value;

  if (!email || !pass) return showMsg("Please enter your email and password.", true);

  btn.disabled = true; btn.textContent = "Signing in…";

  var { error } = await supabase.auth.signInWithPassword({ email: email, password: pass });

  btn.disabled = false; btn.textContent = "Sign in →";

  if (error) return showMsg(error.message, true);

  window.location.href = "dashboard.html";
});

/* Allow Enter key to submit */
document.querySelectorAll("input").forEach(function(input) {
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
  });
});

function showMsg(text, isErr) {
  var el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + (isErr ? "err" : "ok");
}
</script>
</body>
</html>
