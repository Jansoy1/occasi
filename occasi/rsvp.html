<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<title>RSVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Allura&family=Italiana&family=Marcellus&family=Dancing+Script:wght@500;700&family=Josefin+Sans:wght@300;400;500&family=Poppins:wght@300;400;500&family=Inter:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh}
body{font-family:'Inter',sans-serif;line-height:1.5;overflow-x:hidden}

/* ─── LOADING / ERROR ─── */
#initLoader{position:fixed;inset:0;background:#0e0e0e;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999;transition:opacity .4s}
#initLoader.hide{opacity:0;pointer-events:none}
.spinner{width:42px;height:42px;border:3px solid #2a2a2a;border-top-color:#d4b896;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.init-text{font-family:'Cinzel',serif;font-size:11px;color:#888;letter-spacing:.3em;text-transform:uppercase}

#errorState{display:none;min-height:100vh;align-items:center;justify-content:center;padding:40px 20px;text-align:center;background:#0e0e0e;color:#d4b896;flex-direction:column}
#errorState.show{display:flex}
.err-icon{font-size:48px;margin-bottom:14px;opacity:.7}
.err-title{font-family:'Cinzel',serif;font-size:20px;font-weight:500;margin-bottom:8px;letter-spacing:.15em;text-transform:uppercase}
.err-msg{font-family:'Cormorant Garamond',serif;font-size:16px;color:#999;max-width:380px;line-height:1.7;font-style:italic}

/* ─── COMMON RSVP LAYOUT (applied to ALL themes) ─── */
.rsvp-wrap{max-width:1180px;margin:0 auto;padding:60px 20px 80px;position:relative;z-index:1;display:none}
.rsvp-wrap.show{display:block}
.rsvp-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:30px;align-items:start}

/* Photo slideshow on left */
.slideshow{position:relative;border-radius:24px;overflow:hidden;height:clamp(320px,55vw,640px);box-shadow:0 30px 80px rgba(0,0,0,.4)}
.slide{position:absolute;inset:0;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transform:scale(1.04);transition:opacity 1.2s ease,transform 1.5s ease}
.slide.active{opacity:1;transform:scale(1)}
.dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.7);cursor:pointer;transition:background .3s}
.dot.active{background:#fff}

/* Form panel on right */
.panel{padding:8px 4px}
.couple-name{font-size:clamp(40px,7vw,68px);line-height:1;margin-bottom:8px}
.amp{display:block;font-size:.45em;margin:8px 0;font-weight:400}
.divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:24px 0 18px}
.divider span{font-size:11px;letter-spacing:.4em;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:0 0 30px;height:1px;background:currentColor;opacity:.4}
.rsvp-heading{font-size:clamp(24px,4vw,32px);margin-bottom:6px;line-height:1.1}
.rsvp-sub{font-size:13px;line-height:1.7;margin-bottom:18px;opacity:.85}
.tagline{font-size:15px;line-height:1.7;margin:8px 0 0}
.notice{padding:12px 14px;border-radius:11px;font-size:11px;line-height:1.6;margin-bottom:18px;letter-spacing:.04em}

/* Detail tags (date, venue) */
.detail-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.detail-tag{padding:8px 14px;border-radius:18px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;display:inline-flex;align-items:center;gap:6px}

/* Form card */
.card{padding:22px;border-radius:18px;margin-top:6px}
.meta-pills{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;letter-spacing:.04em;font-weight:500}
.pill strong{margin-left:4px}

.attend-toggle{display:flex;gap:8px;margin-bottom:16px}
.attend-toggle label{flex:1;padding:11px;border-radius:11px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:all .2s;border:1.5px solid currentColor;opacity:.7}
.attend-toggle input{display:none}
.attend-toggle label:has(input:checked){opacity:1;background:currentColor}
.attend-toggle label:has(input:checked) span{color:#fff;mix-blend-mode:difference}

.guest-row{border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(0,0,0,.08)}
.guest-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-input{width:100%;padding:11px 14px;border-radius:11px;font-size:14px;outline:none;border:1px solid currentColor;background:rgba(255,255,255,.6);color:inherit;font-family:inherit;transition:border-color .2s,background .2s}
.form-input:focus{background:rgba(255,255,255,.95)}
.form-input::placeholder{opacity:.5}

.submit-btn{margin-top:14px;padding:14px 32px;border-radius:30px;font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border:none;transition:transform .2s,opacity .2s;width:100%;font-family:'Inter',sans-serif}
.submit-btn:hover{transform:translateY(-1px)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.st-msg{margin-top:10px;font-size:13px;text-align:center;min-height:18px;line-height:1.4}

/* SUCCESS SCREEN */
#successScreen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1}
#successScreen.show{display:flex}
.success-card{max-width:520px;width:100%;border-radius:24px;padding:54px 36px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.2)}
.success-icon{font-size:64px;margin-bottom:20px;animation:popIn .6s cubic-bezier(.2,1.4,.5,1) both}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-size:34px;font-weight:700;margin-bottom:14px;line-height:1.1}
.success-names{font-size:18px;margin-bottom:16px;line-height:1.5}
.success-msg{font-size:14px;line-height:1.7;opacity:.85;max-width:380px;margin:0 auto}

/* Animation canvas overlays */
#confettiCanvas,#loveCanvas,#starCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;display:none}

/* ╔══════════════════════════════════════════╗
   ║   THEMES — 10 RICH DIFFERENT DESIGNS    ║
   ╚══════════════════════════════════════════╝ */

/* ───── 1. GARDEN ROMANCE ─── Cream paper, sage botanical ─── */
body.t-garden{background:linear-gradient(135deg,#fdf6ee,#f0e3cf)}
body.t-garden::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse at 15% 25%,rgba(168,184,144,.12),transparent 50%),radial-gradient(ellipse at 85% 75%,rgba(212,184,120,.1),transparent 50%);pointer-events:none}
.t-garden .panel{font-family:'Cormorant Garamond',serif;color:#5a4030}
.t-garden .couple-name{font-family:'Italiana',serif;color:#3d2818;font-weight:400;letter-spacing:.04em}
.t-garden .amp{font-family:'Allura',cursive;color:#8a7050}
.t-garden .tagline{color:#8a7060;font-style:italic}
.t-garden .divider{color:#8a7050}
.t-garden .divider span{font-family:'Cinzel',serif;color:#8a7050;font-weight:500}
.t-garden .rsvp-heading{font-family:'Cinzel',serif;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#3d2818;font-size:18px}
.t-garden .rsvp-sub{color:#8a7060;font-style:italic}
.t-garden .detail-tag{background:rgba(138,112,80,.1);color:#5a4030;border:1px solid rgba(138,112,80,.25)}
.t-garden .notice{background:rgba(168,184,144,.15);color:#5a6840;border:1px solid rgba(168,184,144,.3);font-style:italic}
.t-garden .card{background:#fdf8ec;border:1px solid #d8c8a0}
.t-garden .pill{background:#f0e0c0;color:#5a4030}
.t-garden .attend-toggle label{color:#5a4030}
.t-garden .guest-row{background:#fbf3e3;border-color:#d8c8a0}
.t-garden .guest-header{color:#8a7050;font-family:'Cinzel',serif}
.t-garden .form-input{border-color:#d8c8a0;color:#5a4030}
.t-garden .submit-btn{background:#3d2818;color:#fdf8ec}

/* ───── 2. MIDNIGHT GLAMOUR ─── Black night, gold sparkle ─── */
body.t-midnight{background:radial-gradient(ellipse at top,#1a1428 0%,#0a0612 100%)}
body.t-midnight::before{content:'';position:fixed;inset:0;background-image:radial-gradient(2px 2px at 20% 30%,rgba(212,165,116,.6),transparent),radial-gradient(1px 1px at 70% 60%,rgba(255,215,0,.4),transparent),radial-gradient(1.5px 1.5px at 40% 80%,rgba(212,165,116,.5),transparent),radial-gradient(1px 1px at 85% 20%,rgba(255,215,0,.4),transparent),radial-gradient(1.5px 1.5px at 15% 65%,rgba(212,165,116,.5),transparent);background-size:200px 200px;pointer-events:none}
.t-midnight .panel{font-family:'Cormorant Garamond',serif;color:#c89060}
.t-midnight .couple-name{font-family:'Cinzel',serif;color:#d4a574;letter-spacing:.06em;font-weight:600;text-shadow:0 0 30px rgba(212,165,116,.3)}
.t-midnight .amp{font-style:italic;color:#a08454;font-family:'Cormorant Garamond',serif;font-weight:400}
.t-midnight .tagline{color:#9a7c5c;font-size:11px;letter-spacing:.25em;text-transform:uppercase;font-family:'Cinzel',serif}
.t-midnight .divider{color:#d4a574}
.t-midnight .divider span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5em;color:#d4a574}
.t-midnight .rsvp-heading{font-family:'Cinzel',serif;color:#d4a574;letter-spacing:.2em;font-weight:500;text-transform:uppercase;font-size:18px}
.t-midnight .rsvp-sub{color:#a08454;font-style:italic}
.t-midnight .detail-tag{background:rgba(212,165,116,.08);color:#d4a574;border:1px solid rgba(212,165,116,.25)}
.t-midnight .notice{background:rgba(212,165,116,.08);color:#a08454;border:1px solid rgba(212,165,116,.2);letter-spacing:.05em;font-family:'Cinzel',serif;font-size:10px;text-transform:uppercase}
.t-midnight .card{background:rgba(13,10,24,.6);backdrop-filter:blur(8px);border:1px solid #d4a574}
.t-midnight .pill{background:rgba(212,165,116,.1);color:#d4a574;border:1px solid rgba(212,165,116,.3)}
.t-midnight .attend-toggle label{color:#d4a574}
.t-midnight .guest-row{background:rgba(13,10,24,.5);border-color:rgba(212,165,116,.2)}
.t-midnight .guest-header{color:#a08454;font-family:'Cinzel',serif}
.t-midnight .form-input{border-color:rgba(212,165,116,.4);color:#d4a574;background:rgba(0,0,0,.3)}
.t-midnight .form-input:focus{background:rgba(0,0,0,.5);border-color:#d4a574}
.t-midnight .form-input::placeholder{color:rgba(212,165,116,.4)}
.t-midnight .submit-btn{background:linear-gradient(135deg,#d4a574,#a08454);color:#0a0612;letter-spacing:.3em;font-family:'Cinzel',serif}

/* ───── 3. RUSTIC BARN ─── Kraft paper, hand-script ─── */
body.t-rustic{background:#3a2218;background-image:repeating-linear-gradient(45deg,#3a2218 0,#3a2218 1px,#3d2520 1px,#3d2520 3px)}
body.t-rustic::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse at 30% 30%,rgba(232,200,160,.06),transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(180,100,60,.05),transparent 60%);pointer-events:none}
.t-rustic .panel{font-family:'Cormorant Garamond',serif;color:#e8c8a0}
.t-rustic .couple-name{font-family:'Allura',cursive;color:#f0d4a8;font-weight:400;line-height:.95}
.t-rustic .amp{font-family:'Allura',cursive;color:#c8a070;font-size:.6em;display:inline-block;margin:0 .1em}
.t-rustic .tagline{color:#c8a070;font-style:italic;line-height:1.8}
.t-rustic .divider{color:#c8a070}
.t-rustic .divider span{font-style:italic;font-size:13px;letter-spacing:.06em;text-transform:none;color:#c8a070}
.t-rustic .rsvp-heading{font-family:'Allura',cursive;color:#f0d4a8;font-size:38px;font-weight:400;line-height:1}
.t-rustic .rsvp-sub{color:#c8a070;font-style:italic}
.t-rustic .detail-tag{background:rgba(232,200,160,.08);color:#e8c8a0;border:1px solid rgba(232,200,160,.25);font-family:'Cormorant Garamond',serif;font-style:italic;text-transform:none;letter-spacing:.04em;font-size:13px}
.t-rustic .notice{background:rgba(232,200,160,.08);color:#c8a070;border:1px solid rgba(232,200,160,.2);font-style:italic}
.t-rustic .card{background:rgba(58,32,24,.65);backdrop-filter:blur(6px);border:1px solid #8a4424}
.t-rustic .pill{background:rgba(232,200,160,.1);color:#e8c8a0}
.t-rustic .attend-toggle label{color:#e8c8a0}
.t-rustic .guest-row{background:rgba(58,32,24,.6);border-color:rgba(138,68,36,.4)}
.t-rustic .guest-header{font-family:'Allura',cursive;text-transform:none;font-size:18px;color:#f0d4a8;letter-spacing:0}
.t-rustic .form-input{border-color:rgba(232,200,160,.3);color:#e8c8a0;background:rgba(0,0,0,.25)}
.t-rustic .form-input:focus{background:rgba(0,0,0,.4)}
.t-rustic .form-input::placeholder{color:rgba(232,200,160,.4)}
.t-rustic .submit-btn{background:linear-gradient(135deg,#c89060,#8a4424);color:#fdf8ec;font-family:'Cormorant Garamond',serif;font-style:italic}

/* ───── 4. MODERN MINIMAL ─── Clean white, bold typography ─── */
body.t-modern{background:#fafaf7}
body.t-modern::before{content:'';position:fixed;inset:0;background:linear-gradient(135deg,#fff 0%,#f0f0f4 100%);pointer-events:none}
.t-modern .panel{font-family:'Inter',sans-serif;color:#1a1a1a}
.t-modern .couple-name{font-family:'Playfair Display',serif;font-weight:200;letter-spacing:-.02em;color:#1a1a1a}
.t-modern .amp{font-weight:200;color:#888;font-style:italic}
.t-modern .tagline{color:#555;font-weight:400;line-height:1.7}
.t-modern .divider{color:#1a1a1a}
.t-modern .divider span{font-family:'Inter',sans-serif;font-weight:700;font-size:10px;letter-spacing:.3em;color:#1a1a1a}
.t-modern .rsvp-heading{font-family:'Playfair Display',serif;font-weight:300;letter-spacing:-.01em;color:#1a1a1a}
.t-modern .rsvp-sub{color:#666;font-weight:400}
.t-modern .detail-tag{background:#1a1a1a;color:#fff;letter-spacing:.15em;font-weight:500}
.t-modern .notice{background:#f5f5f0;color:#666;border:1px solid #e0e0d8;font-weight:400;letter-spacing:.04em}
.t-modern .card{background:#fff;border:1px solid #e0e0d8}
.t-modern .pill{background:#f0f0e8;color:#333;font-weight:600}
.t-modern .attend-toggle label{color:#1a1a1a;border-radius:0}
.t-modern .guest-row{background:#fafaf5;border-color:#e0e0d8;border-radius:0}
.t-modern .guest-header{color:#666;font-weight:700}
.t-modern .form-input{border-color:#d8d8d0;color:#1a1a1a;background:#fafaf7;border-radius:0}
.t-modern .form-input:focus{background:#fff;border-color:#1a1a1a}
.t-modern .submit-btn{background:#1a1a1a;color:#fff;border-radius:0;letter-spacing:.25em}

/* ───── 5. WATERCOLOR DREAM ─── Soft pastels, painterly blobs ─── */
body.t-watercolor{background:#fef0e8;background-image:radial-gradient(ellipse at 20% 20%,#fce0e0 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#e8d4f0 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,#fff5e8 0%,transparent 60%)}
body.t-watercolor::before{content:'';position:fixed;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,184,200,.2),transparent 70%);top:10%;right:-100px;filter:blur(40px);animation:float1 8s ease-in-out infinite}
body.t-watercolor::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(180,140,220,.15),transparent 70%);bottom:5%;left:-150px;filter:blur(50px);animation:float2 10s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(20px)}}
.t-watercolor .panel{font-family:'Playfair Display',serif;color:#5a3848}
.t-watercolor .couple-name{font-style:italic;font-weight:700;letter-spacing:-.01em;background:linear-gradient(135deg,#a04060,#7050a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.t-watercolor .amp{font-weight:400;color:#a06878;-webkit-text-fill-color:#a06878;font-style:italic}
.t-watercolor .tagline{color:#705868;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:16px}
.t-watercolor .divider{color:#a06878}
.t-watercolor .divider span{font-style:italic;font-family:'Playfair Display',serif;color:#a06878;letter-spacing:.2em}
.t-watercolor .rsvp-heading{font-style:italic;color:#5a3848;font-weight:700}
.t-watercolor .rsvp-sub{color:#705868;font-style:italic}
.t-watercolor .detail-tag{background:rgba(255,255,255,.7);color:#a04060;border:1px solid rgba(160,64,96,.2);backdrop-filter:blur(8px)}
.t-watercolor .notice{background:rgba(255,255,255,.5);color:#705868;border:1px solid rgba(180,140,220,.25);font-style:italic;backdrop-filter:blur(8px)}
.t-watercolor .card{background:rgba(255,255,255,.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.6)}
.t-watercolor .pill{background:rgba(255,255,255,.7);color:#a04060}
.t-watercolor .attend-toggle label{color:#a04060}
.t-watercolor .guest-row{background:rgba(255,255,255,.5);border-color:rgba(160,104,120,.2)}
.t-watercolor .guest-header{color:#a04060;font-style:italic}
.t-watercolor .form-input{border-color:rgba(160,104,120,.3);color:#5a3848;background:rgba(255,255,255,.7)}
.t-watercolor .submit-btn{background:linear-gradient(135deg,#a04060,#7050a0);color:#fff}

/* ───── 6. DIAMOND GLOW ─── Engagement, ethereal sparkle ─── */
body.t-diamond{background:linear-gradient(180deg,#1a1a3a 0%,#2a1a5a 100%)}
body.t-diamond::before{content:'';position:fixed;inset:0;background-image:radial-gradient(2px 2px at 30% 20%,#fff,transparent),radial-gradient(1px 1px at 70% 50%,#d4d4f8,transparent),radial-gradient(2px 2px at 50% 80%,#fff,transparent),radial-gradient(1px 1px at 20% 60%,#a8a8e0,transparent);background-size:300px 300px;pointer-events:none;animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:.7}}
.t-diamond .panel{font-family:'Playfair Display',serif;color:#c8b8e8}
.t-diamond .couple-name{font-style:italic;color:#fff;font-weight:700}
.t-diamond .amp{font-style:italic;color:#c8b8e8;font-weight:400}
.t-diamond .tagline{color:#a8a0d0;font-style:italic;font-family:'Cormorant Garamond',serif}
.t-diamond .divider{color:#d4d4f8}
.t-diamond .divider span{font-family:'Cinzel',serif;color:#d4d4f8;font-size:11px;letter-spacing:.4em;font-weight:500}
.t-diamond .rsvp-heading{font-style:italic;font-weight:700;color:#fff}
.t-diamond .rsvp-sub{color:#a8a0d0;font-style:italic}
.t-diamond .detail-tag{background:rgba(212,212,248,.1);color:#d4d4f8;border:1px solid rgba(212,212,248,.3);backdrop-filter:blur(8px)}
.t-diamond .notice{background:rgba(212,212,248,.08);color:#c8b8e8;border:1px solid rgba(212,212,248,.2);font-style:italic}
.t-diamond .card{background:rgba(20,20,55,.6);backdrop-filter:blur(16px);border:1px solid rgba(212,212,248,.3)}
.t-diamond .pill{background:rgba(212,212,248,.1);color:#d4d4f8}
.t-diamond .attend-toggle label{color:#d4d4f8}
.t-diamond .guest-row{background:rgba(20,20,55,.5);border-color:rgba(212,212,248,.2)}
.t-diamond .guest-header{color:#c8b8e8;font-style:italic}
.t-diamond .form-input{border-color:rgba(212,212,248,.4);color:#fff;background:rgba(0,0,0,.25)}
.t-diamond .form-input::placeholder{color:rgba(212,212,248,.4)}
.t-diamond .submit-btn{background:linear-gradient(135deg,#fff,#c8b8e8);color:#1a1a3a}

/* ───── 7. STARLIT NIGHT ─── Engagement, deep cosmic, gold ─── */
body.t-starlit{background:radial-gradient(ellipse at top,#1a1438 0%,#0a0a28 100%)}
body.t-starlit::before{content:'';position:fixed;inset:0;background-image:radial-gradient(2px 2px at 20% 30%,rgba(255,215,0,.8),transparent),radial-gradient(1px 1px at 70% 60%,#fff,transparent),radial-gradient(1.5px 1.5px at 40% 80%,rgba(255,215,0,.6),transparent),radial-gradient(1px 1px at 85% 20%,rgba(232,212,255,.5),transparent),radial-gradient(2px 2px at 15% 65%,rgba(255,215,0,.7),transparent);background-size:250px 250px;pointer-events:none;animation:twinkle 5s ease-in-out infinite}
.t-starlit .panel{font-family:'Marcellus',serif;color:#c8b8e8}
.t-starlit .couple-name{font-family:'Italiana',serif;color:#fff;letter-spacing:.04em;font-weight:400}
.t-starlit .amp{font-style:italic;color:#ffd700;font-family:'Cormorant Garamond',serif;font-weight:400}
.t-starlit .tagline{color:#a8a0d0;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:16px}
.t-starlit .divider{color:#ffd700}
.t-starlit .divider span{font-family:'Marcellus',serif;color:#ffd700;font-size:11px;letter-spacing:.4em}
.t-starlit .rsvp-heading{font-family:'Italiana',serif;color:#ffd700;letter-spacing:.06em;font-weight:400}
.t-starlit .rsvp-sub{color:#b8a8e0;font-style:italic}
.t-starlit .detail-tag{background:rgba(255,215,0,.08);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
.t-starlit .notice{background:rgba(232,212,255,.06);color:#c8b8e8;border:1px solid rgba(232,212,255,.2);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:13px}
.t-starlit .card{background:rgba(20,15,55,.6);backdrop-filter:blur(12px);border:1px solid rgba(232,212,255,.2)}
.t-starlit .pill{background:rgba(255,215,0,.1);color:#ffd700}
.t-starlit .attend-toggle label{color:#ffd700}
.t-starlit .guest-row{background:rgba(20,15,55,.5);border-color:rgba(232,212,255,.15)}
.t-starlit .guest-header{font-family:'Italiana',serif;color:#ffd700;text-transform:none;letter-spacing:.05em}
.t-starlit .form-input{border-color:rgba(232,212,255,.3);color:#fff;background:rgba(0,0,0,.3)}
.t-starlit .submit-btn{background:#ffd700;color:#0a0a28;font-family:'Marcellus',serif;letter-spacing:.3em}

/* ───── 8. ROSE GOLD ─── Engagement, soft pink, romantic ─── */
body.t-rosegold{background:linear-gradient(135deg,#fce0d8 0%,#f8c8c0 100%)}
body.t-rosegold::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse at 25% 25%,rgba(255,184,180,.4),transparent 50%),radial-gradient(ellipse at 75% 75%,rgba(232,184,168,.3),transparent 50%);pointer-events:none}
.t-rosegold .panel{font-family:'Cormorant Garamond',serif;color:#704040}
.t-rosegold .couple-name{font-weight:600;letter-spacing:.02em;color:#8a3a2c}
.t-rosegold .amp{font-style:italic;color:#c87a64;font-family:'Allura',cursive;font-weight:400;font-size:.55em}
.t-rosegold .tagline{color:#704040;font-style:italic;font-size:16px;line-height:1.7}
.t-rosegold .divider{color:#c87a64}
.t-rosegold .divider span{color:#c87a64;letter-spacing:.3em;font-size:11px;font-weight:600;text-transform:uppercase}
.t-rosegold .rsvp-heading{color:#8a3a2c;letter-spacing:.04em;font-weight:600}
.t-rosegold .rsvp-sub{color:#a06868;font-style:italic}
.t-rosegold .detail-tag{background:rgba(255,255,255,.7);color:#8a3a2c;border:1px solid rgba(200,122,100,.3);backdrop-filter:blur(8px)}
.t-rosegold .notice{background:rgba(255,255,255,.5);color:#8a5050;border:1px solid rgba(200,122,100,.25);font-style:italic;backdrop-filter:blur(6px)}
.t-rosegold .card{background:#fff;border:1px solid #e8b8a8;box-shadow:0 10px 30px rgba(180,80,80,.1)}
.t-rosegold .pill{background:#fce0d8;color:#8a3a2c}
.t-rosegold .attend-toggle label{color:#8a3a2c}
.t-rosegold .guest-row{background:#fdf3ee;border-color:#e8b8a8}
.t-rosegold .guest-header{color:#c87a64}
.t-rosegold .form-input{border-color:#e8b8a8;color:#704040;background:#fff}
.t-rosegold .submit-btn{background:linear-gradient(135deg,#c87a64,#8a3a2c);color:#fff}

/* ───── 9. CHAMPAGNE TOAST ─── Engagement, celebration ─── */
body.t-champagne{background:#f5e8c8;background-image:radial-gradient(ellipse at 30% 20%,#fff5d4 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,#e8d090 0%,transparent 50%)}
body.t-champagne::before{content:'';position:fixed;inset:0;background-image:radial-gradient(2px 2px at 30% 30%,rgba(212,175,55,.6),transparent),radial-gradient(1px 1px at 70% 60%,rgba(255,235,150,.7),transparent),radial-gradient(2px 2px at 50% 80%,rgba(212,175,55,.5),transparent);background-size:280px 280px;pointer-events:none;animation:twinkle 5s ease-in-out infinite}
.t-champagne .panel{font-family:'Cormorant Garamond',serif;color:#704020}
.t-champagne .couple-name{font-family:'Cinzel',serif;color:#5a3818;font-weight:600;letter-spacing:.06em}
.t-champagne .amp{font-family:'Cormorant Garamond',serif;font-style:italic;color:#c8a050;font-weight:400}
.t-champagne .tagline{color:#704020;font-style:italic;font-size:16px}
.t-champagne .divider{color:#c8a050}
.t-champagne .divider span{font-family:'Cinzel',serif;color:#8a6020;letter-spacing:.4em;font-size:10px}
.t-champagne .rsvp-heading{font-family:'Cinzel',serif;color:#5a3818;letter-spacing:.18em;text-transform:uppercase;font-size:18px;font-weight:500}
.t-champagne .rsvp-sub{color:#8a6020;font-style:italic}
.t-champagne .detail-tag{background:rgba(200,160,80,.15);color:#5a3818;border:1px solid #c8a050}
.t-champagne .notice{background:rgba(200,160,80,.1);color:#704020;border:1px solid rgba(200,160,80,.3);font-style:italic}
.t-champagne .card{background:#fdf8e4;border:2px solid #c8a050}
.t-champagne .pill{background:#fff5d4;color:#5a3818;border:1px solid #c8a050}
.t-champagne .attend-toggle label{color:#5a3818}
.t-champagne .guest-row{background:#fef8d8;border-color:#c8a050}
.t-champagne .guest-header{font-family:'Cinzel',serif;color:#8a6020}
.t-champagne .form-input{border-color:#c8a050;color:#704020;background:#fff}
.t-champagne .submit-btn{background:#5a3818;color:#fdf8e4;font-family:'Cinzel',serif;letter-spacing:.3em}

/* ───── 10. LOVERS LANE ─── Engagement, hand-script, hearts ─── */
body.t-lovers{background:linear-gradient(135deg,#ffd4d8,#ff8a90)}
body.t-lovers::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(255,255,255,.4),transparent 30%),radial-gradient(circle at 80% 70%,rgba(255,255,255,.3),transparent 35%);pointer-events:none}
body.t-lovers::after{content:'❤';position:fixed;top:10%;left:8%;font-size:60px;color:rgba(255,255,255,.25);animation:floatHeart 6s ease-in-out infinite}
@keyframes floatHeart{0%,100%{transform:translateY(0) rotate(-10deg)}50%{transform:translateY(-15px) rotate(10deg)}}
.t-lovers .panel{font-family:'Cormorant Garamond',serif;color:#704040}
.t-lovers .couple-name{font-family:'Dancing Script',cursive;color:#a01828;font-weight:700;line-height:.95}
.t-lovers .amp{font-family:'Dancing Script',cursive;color:#cc3848;font-weight:500}
.t-lovers .tagline{color:#704040;font-style:italic;font-size:16px}
.t-lovers .divider{color:#cc3848}
.t-lovers .divider span{font-family:'Dancing Script',cursive;font-size:18px;letter-spacing:0;text-transform:none;color:#cc3848;font-weight:700}
.t-lovers .rsvp-heading{font-family:'Dancing Script',cursive;color:#a01828;font-weight:700;font-size:38px;line-height:1}
.t-lovers .rsvp-sub{color:#704040;font-style:italic}
.t-lovers .detail-tag{background:rgba(255,255,255,.7);color:#a01828;border:1px solid rgba(160,24,40,.25);backdrop-filter:blur(6px)}
.t-lovers .notice{background:rgba(255,255,255,.5);color:#704040;border:1px solid rgba(255,138,144,.4);font-style:italic;backdrop-filter:blur(6px)}
.t-lovers .card{background:#fff;border:1px solid #ff8a90;box-shadow:0 10px 30px rgba(220,80,100,.2)}
.t-lovers .pill{background:#ffd4d8;color:#a01828}
.t-lovers .attend-toggle label{color:#a01828}
.t-lovers .guest-row{background:#fff5f5;border-color:#ff8a90}
.t-lovers .guest-header{font-family:'Dancing Script',cursive;color:#cc3848;text-transform:none;font-size:18px;letter-spacing:0}
.t-lovers .form-input{border-color:#ff8a90;color:#704040;background:#fff}
.t-lovers .submit-btn{background:linear-gradient(135deg,#ff8a90,#a01828);color:#fff}

/* RESPONSIVE — stack on mobile */
@media(max-width:860px){
  .rsvp-layout{grid-template-columns:1fr;gap:24px}
  .slideshow{height:clamp(260px,55vw,420px)}
}
@media(max-width:480px){
  .rsvp-wrap{padding:40px 14px 60px}
  .name-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>
<canvas id="loveCanvas"></canvas>

<!-- LOADING -->
<div id="initLoader">
  <div class="spinner"></div>
  <div class="init-text">Loading invitation</div>
</div>

<!-- ERROR -->
<div id="errorState">
  <div class="err-icon">✦</div>
  <div class="err-title">Invitation Not Found</div>
  <p class="err-msg" id="errMsg">This RSVP link is invalid or no longer available.</p>
</div>

<!-- RSVP CONTENT (themed) -->
<div class="rsvp-wrap" id="rsvpWrap">
  <div class="rsvp-layout">
    <div class="slideshow" id="slideshow"></div>
    <div class="panel" id="panel"></div>
  </div>
</div>

<!-- SUCCESS -->
<div id="successScreen">
  <div class="success-card" id="successCard">
    <div class="success-icon" id="successIcon">🎉</div>
    <div class="success-title" id="successTitle">Thank You!</div>
    <div class="success-names" id="successNames"></div>
    <p class="success-msg" id="successMsg">RSVP received. We can't wait to celebrate with you!</p>
  </div>
</div>

<script src="js/occasi-auth.js"></script>
<script>
/* ─── Theme defs ─── */
var TEMPLATES = {
  "Garden Romance":   {cls:"t-garden",   slides:["#a8b890","#8a9c70","#b8c0a0"], rsvpTitle:"Please RSVP", divLabel:"Wedding Invitation"},
  "Midnight Glamour": {cls:"t-midnight", slides:["#1a1428","#3a2050","#0d0d1a"], rsvpTitle:"R.S.V.P.",     divLabel:"✦ ✦ ✦"},
  "Rustic Barn":      {cls:"t-rustic",   slides:["#7a4a30","#a06840","#5a3424"], rsvpTitle:"Will you join us?", divLabel:"~ Together Forever ~"},
  "Modern Minimal":   {cls:"t-modern",   slides:["#1a1a1a","#3a3a3a","#5a5a5a"], rsvpTitle:"RSVP",         divLabel:"SAVE THE DATE"},
  "Watercolor Dream": {cls:"t-watercolor",slides:["#fce0e0","#e8d4f0","#fff5e8"],rsvpTitle:"Reply Below",  divLabel:"Our Wedding"},
  "Diamond Glow":     {cls:"t-diamond",  slides:["#1a1a3a","#2a1a5a","#3a2a7a"], rsvpTitle:"R.S.V.P.",     divLabel:"SHE SAID YES"},
  "Starlit Night":    {cls:"t-starlit",  slides:["#1a1438","#2a2448","#3a3458"], rsvpTitle:"Kindly Respond",divLabel:"WRITTEN IN THE STARS"},
  "Rose Gold":        {cls:"t-rosegold", slides:["#fce0d8","#e8b8a8","#c87a64"], rsvpTitle:"Please RSVP",  divLabel:"WITH JOY WE INVITE YOU"},
  "Champagne Toast":  {cls:"t-champagne",slides:["#e8d090","#c8a050","#fff5d4"], rsvpTitle:"R.S.V.P.",     divLabel:"CHEERS TO LOVE"},
  "Lover's Lane":     {cls:"t-lovers",   slides:["#ff8a90","#cc4858","#ffd4d8"], rsvpTitle:"Will you be there?", divLabel:"Two Hearts, One Love"}
};

var siteData = null, contentData = null, inviteSize = 2, currentSlide = 0;

/* Run preview mode immediately */
(function(){
  var slug = new URLSearchParams(location.search).get("site");
  if (slug === "preview" || slug === "test") loadSite();
})();

function onSupabaseReady(){
  var slug = new URLSearchParams(location.search).get("site");
  if (slug !== "preview" && slug !== "test") loadSite();
}

async function loadSite(){
  var p = new URLSearchParams(location.search);
  var slug = p.get("site");
  inviteSize = Math.max(1, Math.min(12, parseInt(p.get("size") || "2")));

  if (slug === "preview" || slug === "test") {
    siteData = { id:"preview", template_name: p.get("template") || "Garden Romance", status:"live" };
    contentData = {
      partner_1:"John", partner_2:"Emma",
      wedding_date:"2026-06-15", rsvp_deadline:"2026-05-01",
      venue_name:"The Grand Hall, London",
      tagline:"We would be honored to have you join us in celebrating our love and the beginning of our new life together."
    };
    renderSite();
    return;
  }

  if (!slug) return showError("No invitation specified.");
  if (!supabase) return showError("Service unavailable. Please try again.");

  var { data: site, error } = await supabase.from("sites").select("*").eq("subdomain", slug).single();
  if (error || !site) return showError("This invitation could not be found.");
  if (site.status !== "live") return showError("This invitation is not currently live.");
  siteData = site;

  var { data: content } = await supabase.from("site_content").select("*").eq("site_id", site.id).single();
  contentData = content || {};
  renderSite();
}

function showError(msg){
  document.getElementById("errMsg").textContent = msg;
  document.getElementById("initLoader").classList.add("hide");
  document.getElementById("errorState").classList.add("show");
  setTimeout(function(){ document.getElementById("initLoader").style.display = "none"; }, 400);
}

function renderSite(){
  var tplName = siteData.template_name || "Garden Romance";
  var tpl = TEMPLATES[tplName] || TEMPLATES["Garden Romance"];

  document.body.className = tpl.cls;

  /* Build slideshow with gradient slides */
  var slides = tpl.slides.map(function(c, i){
    return '<div class="slide' + (i===0?' active':'') + '" style="background:linear-gradient(135deg,'+c+',rgba(0,0,0,.2))"></div>';
  }).join('');
  var dots = tpl.slides.map(function(_, i){ return '<div class="dot'+(i===0?' active':'')+'" data-i="'+i+'"></div>'; }).join('');
  document.getElementById("slideshow").innerHTML = slides + '<div class="dots">' + dots + '</div>';

  /* Auto-rotate slides */
  setInterval(function(){
    var sl = document.querySelectorAll(".slide");
    var dt = document.querySelectorAll(".dot");
    if (!sl.length) return;
    sl[currentSlide]?.classList.remove("active");
    dt[currentSlide]?.classList.remove("active");
    currentSlide = (currentSlide + 1) % sl.length;
    sl[currentSlide]?.classList.add("active");
    dt[currentSlide]?.classList.add("active");
  }, 4500);

  /* Build panel */
  var n1 = contentData.partner_1 || "John";
  var n2 = contentData.partner_2 || "";
  var date = contentData.wedding_date ? new Date(contentData.wedding_date).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) : "Date TBA";
  var venue = contentData.venue_name || "Venue TBA";
  var tagline = contentData.tagline || "We would be honored to have you join us in celebrating our love.";
  var deadline = contentData.rsvp_deadline ? "Please RSVP by " + new Date(contentData.rsvp_deadline).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) : "";

  var couple = n2 ? n1 + '<span class="amp">&amp;</span>' + n2 : n1;

  var rows = '';
  for (var i = 1; i <= inviteSize; i++) {
    rows += '<div class="guest-row">' +
              '<div class="guest-header"><span>Guest ' + i + '</span></div>' +
              '<div class="name-grid">' +
                '<input class="form-input gf" placeholder="First name" maxlength="40">' +
                '<input class="form-input gl" placeholder="Last name" maxlength="40">' +
              '</div>' +
            '</div>';
  }

  var html =
    '<div class="couple-name">' + couple + '</div>' +
    '<p class="tagline">' + tagline + '</p>' +
    '<div class="detail-row">' +
      '<div class="detail-tag">📅 ' + date + '</div>' +
      '<div class="detail-tag">📍 ' + venue + '</div>' +
    '</div>' +
    '<div class="divider"><span>' + tpl.divLabel + '</span></div>' +
    '<h1 class="rsvp-heading">' + tpl.rsvpTitle + '</h1>' +
    '<p class="rsvp-sub">Please let us know if you can join us for this special day.</p>' +
    (deadline ? '<div class="notice">' + deadline + '</div>' : '') +
    '<div class="card">' +
      '<div class="meta-pills">' +
        '<div class="pill">Invite size: <strong>' + inviteSize + '</strong></div>' +
        '<div class="pill">Entered: <strong id="gCnt">0</strong></div>' +
      '</div>' +
      '<div class="attend-toggle">' +
        '<label><input type="radio" name="attend" value="yes" checked><span>✓ Attending</span></label>' +
        '<label><input type="radio" name="attend" value="no"><span>Cannot attend</span></label>' +
      '</div>' +
      rows +
      '<button class="submit-btn" id="subBtn">Submit RSVP</button>' +
      '<div class="st-msg" id="stMsg"></div>' +
    '</div>';

  document.getElementById("panel").innerHTML = html;

  /* Live count */
  document.querySelectorAll(".gf,.gl").forEach(function(input){
    input.addEventListener("input", updateCount);
  });

  document.getElementById("initLoader").classList.add("hide");
  document.getElementById("rsvpWrap").classList.add("show");
  setTimeout(function(){ document.getElementById("initLoader").style.display = "none"; }, 400);
}

function updateCount(){
  var firsts = document.querySelectorAll(".gf");
  var lasts = document.querySelectorAll(".gl");
  var c = 0;
  for (var i = 0; i < firsts.length; i++) {
    if (firsts[i].value.trim() && lasts[i].value.trim()) c++;
  }
  var el = document.getElementById("gCnt");
  if (el) el.textContent = c;
}

/* Click dots */
document.addEventListener("click", function(e){
  if (e.target.classList.contains("dot")) {
    var i = parseInt(e.target.dataset.i);
    document.querySelectorAll(".slide").forEach(function(s,idx){
      s.classList.toggle("active", idx === i);
    });
    document.querySelectorAll(".dot").forEach(function(d,idx){
      d.classList.toggle("active", idx === i);
    });
    currentSlide = i;
  }
});

/* Submit */
document.addEventListener("click", async function(e){
  if (e.target.id !== "subBtn") return;
  var btn = e.target;
  var attending = document.querySelector('input[name="attend"]:checked')?.value === "yes";
  var firsts = document.querySelectorAll(".gf");
  var lasts = document.querySelectorAll(".gl");

  var guests = [];
  for (var i = 0; i < firsts.length; i++) {
    var f = firsts[i].value.trim(), l = lasts[i].value.trim();
    if (f && l) guests.push({first:f, last:l});
    else if (f || l) {
      document.getElementById("stMsg").innerHTML = '<span style="color:#cc2020">Please complete both first &amp; last name for each guest</span>';
      return;
    }
  }

  if (guests.length === 0) {
    document.getElementById("stMsg").innerHTML = '<span style="color:#cc2020">Please enter at least one name</span>';
    return;
  }

  btn.disabled = true; btn.textContent = "Submitting…";

  if (siteData.id === "preview") {
    setTimeout(function(){
      btn.disabled = false; btn.textContent = "Submit RSVP";
      showSuccess(guests, attending);
    }, 600);
    return;
  }

  var rows = guests.map(function(g){
    return {
      site_id: siteData.id,
      guest_first: g.first,
      guest_last: g.last,
      invite_size: guests.length,
      attending: attending
    };
  });

  var { error } = await supabase.from("rsvp_responses").insert(rows);
  btn.disabled = false; btn.textContent = "Submit RSVP";
  if (error) {
    document.getElementById("stMsg").innerHTML = '<span style="color:#cc2020">Could not submit. Please try again.</span>';
    return;
  }
  showSuccess(guests, attending);
});

function showSuccess(guests, attending){
  document.getElementById("rsvpWrap").classList.remove("show");
  document.getElementById("successScreen").classList.add("show");

  /* Apply theme styling to success card */
  var tplName = siteData.template_name || "Garden Romance";
  var tpl = TEMPLATES[tplName] || TEMPLATES["Garden Romance"];
  var card = document.getElementById("successCard");
  card.className = "success-card " + tpl.cls + "-success";
  /* Inherit panel styles */
  var hostStyle = window.getComputedStyle(document.getElementById("panel"));
  card.style.color = hostStyle.color;
  card.style.fontFamily = hostStyle.fontFamily;
  card.style.background = "rgba(255,255,255,.92)";
  if (tpl.cls === "t-midnight" || tpl.cls === "t-rustic" || tpl.cls === "t-diamond" || tpl.cls === "t-starlit") {
    card.style.background = "rgba(0,0,0,.65)";
    card.style.backdropFilter = "blur(16px)";
    card.style.border = "1px solid rgba(255,255,255,.15)";
  }

  if (!attending) {
    document.getElementById("successIcon").textContent = "💕";
    document.getElementById("successTitle").textContent = "Thank you for letting us know";
    document.getElementById("successNames").innerHTML = guests.map(function(g){return g.first + " " + g.last}).join("<br>");
    document.getElementById("successMsg").textContent = "We're sorry you can't make it. We'll miss you on the day!";
  } else {
    document.getElementById("successIcon").textContent = "🎉";
    document.getElementById("successTitle").textContent = "Wonderful!";
    document.getElementById("successNames").innerHTML = guests.map(function(g){return g.first + " " + g.last}).join("<br>");
    document.getElementById("successMsg").textContent = "Your RSVP is confirmed for " + guests.length + " guest" + (guests.length !== 1 ? "s" : "") + ". We can't wait to celebrate with you!";
  }
}
</script>
</body>
</html>
