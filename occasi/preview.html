<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<title>Preview — Occasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600&family=Dancing+Script:wght@600&family=Great+Vibes&family=Bebas+Neue&family=Pacifico&family=Abril+Fatface&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#1a0a14;min-height:100vh}

/* ── PREVIEW BAR ── */
.preview-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(26,10,20,.95);backdrop-filter:blur(16px);border-bottom:1px solid #5d2540;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.pb-info{color:#fff5ec;display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.pb-back{font-size:13px;color:#fff5ec;text-decoration:none;display:inline-flex;align-items:center;gap:5px;font-weight:500;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.06);transition:background .2s;flex-shrink:0}
.pb-back:hover{background:rgba(255,255,255,.12)}
.pb-name{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:#fff5ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-cat{font-size:10px;color:#a08a78;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.pb-actions{display:flex;gap:6px;flex-shrink:0}
.pb-btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;letter-spacing:.04em;display:inline-flex;align-items:center}
.pb-btn-grad{background:linear-gradient(135deg,#ff6b9d,#d4a574);color:#1a0a14;box-shadow:0 4px 12px rgba(255,107,157,.3)}
.pb-btn-grad:hover{transform:translateY(-1px)}
.pb-btn-ghost{background:rgba(255,255,255,.08);color:#fff5ec;border:1px solid rgba(255,255,255,.15)}
.pb-btn-ghost:hover{background:rgba(255,255,255,.14)}

/* ── PREVIEW SCREEN ── */
.preview-screen{padding-top:60px;min-height:100vh}

/* Each design fills the whole screen with its own theme */
.design{min-height:calc(100vh - 60px);padding:50px 24px;display:flex;align-items:center;justify-content:center}
.design-card{max-width:520px;width:100%;text-align:center;padding:40px 32px;border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.4)}

/* Common card sub-elements */
.dc-eyebrow{font-size:11px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;margin-bottom:18px;opacity:.85}
.dc-names{font-size:clamp(36px,8vw,52px);font-weight:700;line-height:1;margin-bottom:10px;letter-spacing:-.01em}
.dc-amp{font-size:clamp(24px,5vw,34px);display:block;margin:8px 0;font-style:italic;opacity:.8}
.dc-tagline{font-size:14px;line-height:1.6;margin:18px auto;max-width:380px;opacity:.85}
.dc-divider{height:1px;width:60px;margin:18px auto;opacity:.4}
.dc-detail{font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:6px;opacity:.7}
.dc-bigdate{font-family:'Playfair Display',serif;font-size:clamp(28px,6vw,40px);font-weight:700;line-height:1;margin:6px 0 4px}
.dc-venue{font-size:13px;opacity:.75;margin-top:14px}
.dc-rsvp{margin-top:24px;padding:12px 28px;border-radius:24px;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;display:inline-block;cursor:pointer;border:none;font-family:'Inter',sans-serif}
.dc-photo{width:100%;height:180px;background-size:cover;background-position:center;border-radius:14px;margin-bottom:24px;display:flex;align-items:center;justify-content:center;font-size:48px;opacity:.85}

  html +=     '<div class="dc-bigdate">' + sample.date + '</div>';
  html +=     '<div class="dc-venue">' + sample.venue + '</div>';
  html +=     '<button class="dc-rsvp">RSVP Now</button>';
  html +=   '</div>';
  html += '</div>';
  document.getElementById("previewScreen").innerHTML = html;
}

document.getElementById("useBtn").addEventListener("click", function() {
