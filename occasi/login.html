<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<title>Sign In — Occasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
h1{font-family:'Playfair Display',serif;font-size:24px;text-align:center;margin-bottom:6px;font-weight:700;line-height:1.1}
h1 em{font-style:italic;background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:var(--ink2);text-align:center;margin-bottom:20px}
.sub a{color:var(--c2);text-decoration:none;font-weight:600}
.social{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.s-btn{width:100%;padding:11px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.95);color:#1a0a14;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'Inter',sans-serif;transition:all .2s}
.s-btn:hover,.s-btn:active{border-color:var(--c2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,80,180,.12)}
.s-btn svg{width:17px;height:17px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.08em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.forgot{text-align:right;margin-bottom:12px}
.forgot a{font-size:12px;color:var(--muted);text-decoration:none;font-weight:500}
.forgot a:hover{color:var(--c2)}
.submit{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.04em;box-shadow:0 6px 18px rgba(200,80,180,.3)}
.submit:hover,.submit:active{transform:translateY(-1px);box-shadow:0 10px 26px rgba(200,80,180,.45)}
#resetScreen{display:none}
.back-link{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:16px;display:inline-flex;align-items:center;gap:4px;padding:0;font-weight:600}
.back-link:hover{color:var(--c2)}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="brand-logo"><img src="assets/logo.png" alt="Occasi" style="height:32px;width:auto;display:block"><span class="logo-text">OCCASI</span></a>
  <a href="signup.html" class="btn btn-grad btn-sm">Get Started</a>
</nav>

<div class="page-wrap">
  <div class="page-card" style="max-width:400px">

    <div id="loginScreen">
      <h1>Welcome <em>back</em></h1>
      <p class="sub">No account? <a href="signup.html">Start free</a></p>

      <div class="social">
        <button class="s-btn" id="googleBtn" type="button">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <button class="s-btn" id="appleBtn" type="button">
          <svg viewBox="0 0 24 24" fill="#000"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Continue with Apple
        </button>
      </div>

      <div class="divider">or sign in with email</div>

      <div class="field"><label>Email</label><input type="email" id="email" placeholder="your@email.com"></div>
      <div class="field"><label>Password</label><input type="password" id="pass" placeholder="Your password"></div>
      <div class="forgot"><a href="#" id="forgotLink">Forgot password?</a></div>
      <button class="submit" id="loginBtn">Sign In</button>
      <div class="msg" id="msg"></div>
    </div>

    <div id="resetScreen">
      <button class="back-link" id="backBtn" type="button">← Back to sign in</button>
      <h1>Reset <em>password</em></h1>
      <p class="sub">Enter your email and we'll send you a reset link.</p>
      <div class="field"><label>Email</label><input type="email" id="resetEmail" placeholder="your@email.com"></div>
      <button class="submit" id="resetBtn">Send Reset Link</button>
      <div class="msg" id="resetMsg"></div>
    </div>

  </div>
</div>

<script src="js/occasi-ui.js"></script>
<script src="js/occasi-auth.js"></script>
<script>
function onSupabaseReady() {
  document.getElementById("googleBtn").addEventListener("click", async function(){
    const { error } = await supabase.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.origin + "/dashboard.html"}});
    if (error) showMsg("msg", error.message, true);
  });
  document.getElementById("appleBtn").addEventListener("click", async function(){
    const { error } = await supabase.auth.signInWithOAuth({provider:"apple",options:{redirectTo:window.location.origin + "/dashboard.html"}});
    if (error) showMsg("msg", error.message, true);
  });
  document.getElementById("loginBtn").addEventListener("click", async function(){
    var btn = this, email = document.getElementById("email").value.trim(), pass = document.getElementById("pass").value;
    if (!email || !pass) return showMsg("msg","Please enter your email and password.",true);
    btn.disabled = true; btn.textContent = "Signing in…";
    const { data, error } = await supabase.auth.signInWithPassword({email, password: pass});
    btn.disabled = false; btn.textContent = "Sign In";
    if (error) return showMsg("msg", error.message, true);
    if (data.user.email === ADMIN_EMAIL) window.location.href = "admin.html";
    else window.location.href = "dashboard.html";
  });
  document.getElementById("forgotLink").addEventListener("click", function(e){e.preventDefault();document.getElementById("loginScreen").style.display="none";document.getElementById("resetScreen").style.display="block"});
  document.getElementById("backBtn").addEventListener("click", function(){document.getElementById("resetScreen").style.display="none";document.getElementById("loginScreen").style.display="block"});
  document.getElementById("resetBtn").addEventListener("click", async function(){
    var email = document.getElementById("resetEmail").value.trim();
    if (!email) return showMsg("resetMsg","Please enter your email.",true);
    const { error } = await supabase.auth.resetPasswordForEmail(email, {redirectTo: window.location.origin + "/reset-password.html"});
    showMsg("resetMsg", error ? error.message : "✓ Reset link sent!", !!error);
  });
}
function showMsg(id, m, e){var el = document.getElementById(id); el.textContent = m; el.className = "msg " + (e ? "err" : "ok");}
</script>
</body>
</html>
