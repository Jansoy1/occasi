<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<title>Templates — Occasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
.hero{padding:78px 20px 24px;text-align:center}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,46px);font-weight:700;line-height:1.05;margin-bottom:8px;color:var(--ink)}
.hero h1 em{font-style:italic;background:linear-gradient(135deg,var(--c1),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:14px;color:var(--ink2);max-width:480px;margin:0 auto}

.cat-tabs{display:flex;justify-content:center;gap:8px;padding:24px 16px 0;flex-wrap:wrap;max-width:900px;margin:0 auto}
.ctab{padding:9px 18px;border-radius:20px;border:1.5px solid var(--line);background:var(--card);color:var(--ink2);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.04em;font-family:'Inter',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.ctab:hover{border-color:var(--c1);color:var(--c1)}
.ctab.active{background:linear-gradient(135deg,var(--c1),var(--c3));color:var(--bg);border-color:transparent}

.wrap{max-width:1120px;margin:0 auto;padding:24px 16px 60px}
.cat-info{text-align:center;margin-bottom:24px;padding:16px;background:var(--card);border-radius:14px;border:1px solid var(--line)}
.cat-info-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);margin-bottom:4px;font-weight:700}
.cat-info-sub{font-size:12px;color:var(--muted)}

.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tc{border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .25s;background:var(--card)}
.tc:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--c1)}
.tp{height:160px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;letter-spacing:.06em;text-align:center;padding:14px;font-family:'Playfair Display',serif;font-style:italic;position:relative;overflow:hidden}
.tb{padding:14px 16px}
.tn{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px}
.td{font-size:11px;color:var(--ink2);margin-bottom:10px;line-height:1.5}
.tt{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ttag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(255,107,157,.1);color:var(--c1);border:1px solid rgba(255,107,157,.2)}
.ta{display:flex;gap:6px}
.ta button{flex:1;padding:8px;border-radius:7px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.ta .preview{border:1.5px solid var(--line);background:transparent;color:var(--ink2)}
.ta .preview:hover{border-color:var(--c1);color:var(--c1)}
.ta .select{border:none;background:linear-gradient(135deg,var(--c1),var(--c3));color:var(--bg);box-shadow:0 4px 10px rgba(255,107,157,.25)}
.ta .select:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(255,107,157,.4)}

@media(max-width:860px){.tg{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.tg{grid-template-columns:1fr}.cat-tabs{padding:20px 12px 0}}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="brand-logo"><img src="assets/logo.png" alt="Occasi" style="height:32px;width:auto;display:block"><span class="logo-text">OCCASI</span></a>
  <div class="top-nav-right">
    <a href="login.html" class="btn btn-ghost btn-sm">Sign in</a>
    <a href="signup.html" class="btn btn-grad btn-sm">Get Started →</a>
  </div>
</nav>

<div class="hero">
  <h1>Choose your<br><em>perfect template</em></h1>
  <p>10 unique designs for every event category.</p>
</div>

<div class="cat-tabs">
  <button class="ctab active" data-cat="weddings">💒 Weddings</button>
  <button class="ctab" data-cat="birthdays">🎂 Birthdays</button>
  <button class="ctab" data-cat="corporate">💼 Corporate</button>
  <button class="ctab" data-cat="graduations">🎓 Graduations</button>
  <button class="ctab" data-cat="baby-showers">🍼 Baby Showers</button>
  <button class="ctab" data-cat="engagements">💍 Engagements</button>

<div class="wrap">

  <div class="tg" id="grid"></div>

var CAT_NAMES = {
  weddings: "Wedding Designs",
  birthdays: "Birthday Designs",
  corporate: "Corporate Event Designs",
  graduations: "Graduation Designs",
  "baby-showers": "Baby Shower Designs",
  engagements: "Engagement Designs"
};

function buildGrid(cat) {
  var arr = DESIGNS[cat] || [];
  document.getElementById("catTitle").textContent = CAT_NAMES[cat] || "Templates";
  document.getElementById("grid").innerHTML = arr.map(function(t,i){
    var tags = ["RSVP","Website"][i%2 === 0 ? 0 : 1];
    return '<div class="tc"><div class="tp" style="background:'+t.bg+';color:'+t.fg+';cursor:pointer" onclick="window.open(\'rsvp.html?site=preview&template='+encodeURIComponent(t.n)+'\',\'_blank\')">'+t.n+'</div><div class="tb"><div class="tn">'+t.n+'</div><div class="td">'+t.d+'</div><div class="tt"><span class="ttag">'+CAT_NAMES[cat].split(" ")[0]+'</span><span class="ttag">Customisable</span></div><div class="ta"><button class="preview" onclick="window.open(\'rsvp.html?site=preview&template='+encodeURIComponent(t.n)+'\',\'_blank\')">Try Demo</button><button class="select" onclick="window.location.href=\'signup.html?template='+encodeURIComponent(t.n)+'&cat='+cat+'\'">Use This →</button></div></div></div>';
  }).join('');
}

/* Get cat from URL */
var urlCat = new URLSearchParams(location.search).get("cat") || "weddings";
if (!DESIGNS[urlCat]) urlCat = "weddings";
buildGrid(urlCat);

/* Set initial active tab */
document.querySelectorAll(".ctab").forEach(function(tab){
  if (tab.dataset.cat === urlCat) tab.classList.add("active");
  else tab.classList.remove("active");
  tab.addEventListener("click", function(){
    document.querySelectorAll(".ctab").forEach(function(t){t.classList.remove("active")});
    tab.classList.add("active");
    buildGrid(tab.dataset.cat);
    /* Update URL without reload */
    var url = new URL(window.location);
    url.searchParams.set("cat", tab.dataset.cat);
    window.history.replaceState({}, '', url);
  });
});
</script>
