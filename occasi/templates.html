<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<title>Templates — Occasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
.hero{padding:78px 20px 24px;text-align:center}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,46px);font-weight:700;line-height:1.05;margin-bottom:8px;color:var(--ink)}
.hero h1 em{font-style:italic;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:14px;color:var(--ink2);max-width:480px;margin:0 auto}

.cat-tabs{display:flex;justify-content:center;gap:8px;padding:24px 16px 0;flex-wrap:wrap;max-width:900px;margin:0 auto}
.ctab{padding:9px 18px;border-radius:20px;border:1.5px solid var(--line);background:#fff;color:var(--ink2);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.04em;font-family:'Inter',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.ctab:hover{border-color:var(--c2);color:var(--c2)}
.ctab.active{background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));color:#fff;border-color:transparent}
.ctab.disabled{opacity:.5;cursor:not-allowed}
.ctab.disabled:hover{border-color:var(--line);color:var(--ink2)}

.wrap{max-width:1120px;margin:0 auto;padding:24px 16px 60px}
.cat-info{text-align:center;margin-bottom:24px;padding:16px;background:#fff;border-radius:14px;border:1px solid var(--line)}
.cat-info-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);margin-bottom:4px;font-weight:700}
.cat-info-sub{font-size:12px;color:var(--muted)}

.coming-soon{padding:60px 20px;text-align:center;background:#fff;border:2px dashed var(--line-purple);border-radius:18px;margin-top:30px}
.coming-soon-icon{font-size:48px;margin-bottom:12px}
.coming-soon h3{font-family:'Playfair Display',serif;font-size:24px;color:var(--ink);margin-bottom:8px;font-weight:700}
.coming-soon p{font-size:14px;color:var(--ink2);max-width:380px;margin:0 auto}

.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tc{border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .25s;background:#fff}
.tc:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--c2)}
.tp{height:160px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;letter-spacing:.06em;text-align:center;padding:14px;font-family:'Playfair Display',serif;font-style:italic;position:relative;overflow:hidden}
.tb{padding:14px 16px}
.tn{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px}
.td{font-size:11px;color:var(--ink2);margin-bottom:10px;line-height:1.5;min-height:32px}
.tt{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ttag{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(122,62,200,.1);color:var(--c2);border:1px solid rgba(122,62,200,.2)}
.ttag.unique{background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));color:#fff;border-color:transparent}
.ta{display:flex;gap:6px}
.ta button{flex:1;padding:8px;border-radius:7px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.ta .preview{border:1.5px solid var(--line-purple);background:#fff;color:var(--c2)}
.ta .preview:hover{background:var(--c2);color:#fff}
.ta .select{border:none;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));color:#fff;box-shadow:0 4px 10px rgba(122,62,200,.25)}

@media(max-width:860px){.tg{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.tg{grid-template-columns:1fr}.cat-tabs{padding:20px 12px 0}}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="brand-logo"><img src="assets/logo.png" alt="Occasi" style="height:32px;width:auto;display:block"><span class="logo-text">OCCASI</span></a>
  <div class="top-nav-right">
    <a href="login.html" class="btn btn-ghost btn-sm" id="navSignIn">Sign in</a>
    <a href="signup.html" class="btn btn-grad btn-sm" id="navGetStarted">Get Started →</a>
    <a href="dashboard.html" class="btn btn-grad btn-sm" id="navDashboard" style="display:none">My Dashboard →</a>
  </div>
</nav>

<div class="hero">
  <h1>Choose your<br><em>perfect template</em></h1>
  <p>Each design is uniquely crafted — different layouts, fonts, and feelings. Click "Try Demo" to see it live.</p>
</div>

<div class="cat-tabs">
  <button class="ctab active" data-cat="weddings">💒 Weddings</button>
  <button class="ctab" data-cat="engagements">💍 Engagements</button>
  <button class="ctab disabled" data-cat="birthdays">🎂 Birthdays · Soon</button>
  <button class="ctab disabled" data-cat="baby-showers">🍼 Baby Showers · Soon</button>
  <button class="ctab disabled" data-cat="corporate">💼 Corporate · Soon</button>
  <button class="ctab disabled" data-cat="graduations">🎓 Graduations · Soon</button>
</div>

<div class="wrap">
  <div class="cat-info">
    <div class="cat-info-title" id="catTitle">Wedding Designs</div>
    <div class="cat-info-sub" id="catSub">5 truly unique designs — each with its own layout, fonts, and feel</div>
  </div>
  <div id="grid"></div>
</div>

<script src="js/occasi-ui.js"></script>
<script src="js/occasi-auth.js"></script>
<script>
/* Only the 10 fully-built designs - 5 weddings + 5 engagements */
var DESIGNS = {
  weddings: [
    {n:"Garden Romance",d:"Classic centered layout. Warm cream paper with floral accents and elegant serif type.",bg:"linear-gradient(180deg,#f0e8d0,#dac9a0)",fg:"#3d2818",previewBg:"#fdf8ec",previewFg:"#3d2818"},
    {n:"Midnight Glamour",d:"Deep black with shimmering gold borders. Art-deco-inspired with diamond accents.",bg:"#0d0a18",fg:"#d4a574",previewBg:"#0d0a18",previewFg:"#d4a574"},
    {n:"Rustic Barn",d:"Hand-written script on kraft paper. Warm browns with romantic flowing typography.",bg:"#e8c8a0",fg:"#3a2010",previewBg:"#e8c8a0",previewFg:"#5a2810"},
    {n:"Modern Minimal",d:"Asymmetric split layout. Clean lines, bold typography, vertical date sidebar.",bg:"#fff",fg:"#1a1a1a",previewBg:"#fff",previewFg:"#1a1a1a"},
    {n:"Watercolor Dream",d:"Soft layered pastels with painterly blob accents. Glassy backdrop blur effect.",bg:"linear-gradient(135deg,#fce0e0,#e8d0e8,#fff5e8)",fg:"#5a3848",previewBg:"rgba(255,255,255,.7)",previewFg:"#5a3848"}
  ],
  engagements: [
    {n:"Diamond Glow",d:"Arched dome layout with glowing diamond ring and ethereal sparkle.",bg:"linear-gradient(180deg,#1a1a3a,#2a1a5a)",fg:"#fff",previewBg:"#fff",previewFg:"#1a1a3a"},
    {n:"Starlit Night",d:"Deep starry sky backdrop with celestial typography and gold accent stars.",bg:"radial-gradient(ellipse at top,#1a1438 0%,#0a0a28 100%)",fg:"#ffd700",previewBg:"rgba(20,15,55,.7)",previewFg:"#e8d4ff"},
    {n:"Rose Gold",d:"Soft pink florals on white card. Romantic with elegant ampersand script.",bg:"linear-gradient(135deg,#fce0d8,#f8c8c0)",fg:"#8a3a2c",previewBg:"#fff",previewFg:"#8a3a2c"},
    {n:"Champagne Toast",d:"Cream and gold double-border. Celebration ribbon with toasting glasses.",bg:"#fdf8e4",fg:"#5a3818",previewBg:"#fdf8e4",previewFg:"#5a3818"},
    {n:"Lover's Lane",d:"Pink hearts that beat softly. Hand-written script on rounded card.",bg:"linear-gradient(135deg,#ffd4d8,#ff8a90)",fg:"#a01828",previewBg:"#fff",previewFg:"#a01828"}
  ]
};

var CAT_NAMES = {
  weddings:"Wedding Designs",
  engagements:"Engagement Designs"
};

function buildGrid(cat) {
  var arr = DESIGNS[cat];
  if (!arr) {
    /* Coming soon */
    document.getElementById("catTitle").textContent = "Coming Soon";
    document.getElementById("catSub").textContent = "We're crafting beautiful designs for this category — sign up for early access!";
    document.getElementById("grid").innerHTML = '<div class="coming-soon"><div class="coming-soon-icon">✨</div><h3>New designs coming soon</h3><p>We focus on quality over quantity. Each new template gets the same care as our wedding designs. Check back in a few weeks!</p></div>';
    return;
  }
  document.getElementById("catTitle").textContent = CAT_NAMES[cat] || "Templates";
  document.getElementById("catSub").textContent = arr.length + " truly unique designs — each with its own layout, fonts, and feel";

  document.getElementById("grid").innerHTML = '<div class="tg">' + arr.map(function(t){
    return '<div class="tc">' +
      '<div class="tp" style="background:'+t.previewBg+';color:'+t.previewFg+';cursor:pointer" onclick="window.open(\'rsvp.html?site=preview&template='+encodeURIComponent(t.n)+'\',\'_blank\')">'+t.n+'</div>' +
      '<div class="tb"><div class="tn">'+t.n+'</div>' +
      '<div class="td">'+t.d+'</div>' +
      '<div class="tt"><span class="ttag unique">Unique Layout</span><span class="ttag">Customisable</span></div>' +
      '<div class="ta">' +
        '<button class="preview" onclick="window.open(\'rsvp.html?site=preview&template='+encodeURIComponent(t.n)+'\',\'_blank\')">Try Demo</button>' +
        '<button class="select" onclick="pickTemplate(\''+t.n.replace(/'/g,"\\'")+'\')">Use This →</button>' +
      '</div></div></div>';
  }).join('') + '</div>';
}

window.pickTemplate = async function(name) {
  /* Check if logged in - if so, go to dashboard with template chosen */
  if (supabase) {
    var { data:{ user } } = await supabase.auth.getUser();
    if (user) {
      window.location.href = "dashboard.html?pick=" + encodeURIComponent(name);
      return;
    }
  }
  window.location.href = "signup.html?template=" + encodeURIComponent(name);
};

var urlCat = new URLSearchParams(location.search).get("cat") || "weddings";
buildGrid(urlCat);

document.querySelectorAll(".ctab").forEach(function(tab){
  if (tab.dataset.cat === urlCat) tab.classList.add("active");
  tab.addEventListener("click", function(){
    if (tab.classList.contains("disabled") && tab.dataset.cat !== "weddings" && tab.dataset.cat !== "engagements") {
      buildGrid(tab.dataset.cat);
    } else {
      buildGrid(tab.dataset.cat);
    }
    document.querySelectorAll(".ctab").forEach(function(t){t.classList.remove("active")});
    tab.classList.add("active");
    var url = new URL(window.location);
    url.searchParams.set("cat", tab.dataset.cat);
    window.history.replaceState({}, '', url);
  });
});

function onSupabaseReady() {
  if (!supabase) return;
  supabase.auth.getUser().then(function(res){
    if (res?.data?.user) {
      document.getElementById("navSignIn").style.display = "none";
      document.getElementById("navGetStarted").style.display = "none";
      document.getElementById("navDashboard").style.display = "inline-flex";
    }
  });
}
</script>
</body>
</html>
