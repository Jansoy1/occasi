<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<title>Downloads — Occasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
.hero{padding:78px 20px 24px;text-align:center}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,46px);font-weight:700;line-height:1.05;margin-bottom:8px;color:var(--ink)}
.hero h1 em{font-style:italic;background:linear-gradient(135deg,var(--c1),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:14px;color:var(--ink2);max-width:480px;margin:0 auto}

.tabs{display:flex;justify-content:center;gap:8px;padding:24px 16px 0;flex-wrap:wrap}
.tab{padding:9px 18px;border-radius:20px;border:1.5px solid var(--line);background:var(--card);color:var(--ink2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.tab:hover{border-color:var(--c1);color:var(--c1)}
.tab.active{background:linear-gradient(135deg,var(--c1),var(--c3));color:var(--bg);border-color:transparent}

.wrap{max-width:1080px;margin:0 auto;padding:24px 16px 60px}
.dl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dl-card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:all .25s;display:flex;flex-direction:column}
.dl-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--c1)}
.dl-prev{height:130px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,rgba(255,107,157,.15),rgba(212,165,116,.15));border-bottom:1px solid var(--line)}
.dl-info{padding:14px 16px;flex:1;display:flex;flex-direction:column}
.dl-cat{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--c1);margin-bottom:5px}
.dl-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.dl-desc{font-size:11px;color:var(--ink2);line-height:1.5;margin-bottom:12px;flex:1}
.dl-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dl-price{font-family:'Playfair Display',serif;font-size:20px;color:var(--ink);font-weight:700}
.dl-price.free{background:linear-gradient(135deg,var(--c1),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dl-btn{padding:8px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--c1),var(--c3));color:var(--bg);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif}
.dl-btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(255,107,157,.3)}

@media(max-width:780px){.dl-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.dl-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="brand-logo"><img src="assets/logo.png" alt="Occasi" style="height:32px;width:auto;display:block"><span class="logo-text">OCCASI</span></a>
  <div class="top-nav-right">
    <a href="login.html" class="btn btn-ghost btn-sm">Sign in</a>
    <a href="signup.html" class="btn btn-grad btn-sm">Get Started →</a>
  </div>
</nav>

<div class="hero">
  <h1>Smart tools<br><em>&amp; templates</em></h1>
  <p>Excel automations, document templates, planners — all professionally built.</p>
</div>

<div class="tabs">
  <button class="tab active" data-filter="all">All</button>
  <button class="tab" data-filter="excel">📊 Excel Automations</button>
  <button class="tab" data-filter="document">📄 Document Templates</button>
</div>

<div class="wrap">
  <div class="dl-grid" id="grid"></div>
</div>

<script>
/* ============================================
   20 DOWNLOADABLE PRODUCTS
   10 Excel automated sheets · 10 document templates
   ============================================ */
var DOWNLOADS = [
  /* ─── EXCEL AUTOMATIONS (10) ─── */
  {cat:"excel",icon:"💷",name:"Wedding Budget Tracker",desc:"Auto-calculates expenses across categories, tracks deposits, shows you exactly what's left.",price:9},
  {cat:"excel",icon:"📋",name:"Guest List Manager",desc:"Track RSVPs, dietary needs, plus-ones, table assignments — auto-updates totals.",price:9},
  {cat:"excel",icon:"🗓️",name:"Wedding Timeline Planner",desc:"Auto-generated 12-month countdown with task tracking and milestone alerts.",price:9},
  {cat:"excel",icon:"🪑",name:"Seating Chart Optimiser",desc:"Drag-and-drop seating with auto-balance for tables and conflict detection.",price:12},
  {cat:"excel",icon:"💰",name:"Personal Finance Dashboard",desc:"Auto-tracks income, expenses, savings goals — beautiful charts &amp; insights.",price:14},
  {cat:"excel",icon:"📈",name:"Small Business Tracker",desc:"Invoice log, expense tracker, profit calculator — auto-totals everything.",price:19},
  {cat:"excel",icon:"📊",name:"Project Management Sheet",desc:"Gantt chart, task assignments, deadline tracker — fully automated.",price:14},
  {cat:"excel",icon:"🎯",name:"Goal &amp; Habit Tracker",desc:"Daily/weekly/monthly habits with streak counters and progress bars.",price:7},
  {cat:"excel",icon:"🏠",name:"Home Renovation Budget",desc:"Room-by-room cost tracking with contractor quote comparison.",price:12},
  {cat:"excel",icon:"✈️",name:"Trip Planner Spreadsheet",desc:"Itinerary builder, expense splitter, packing list — all automated.",price:9},
  /* ─── DOCUMENT TEMPLATES (10) ─── */
  {cat:"document",icon:"💌",name:"Save the Date Template",desc:"Beautifully designed Word doc — just edit names &amp; dates.",price:0},
  {cat:"document",icon:"📜",name:"Wedding Vows Template",desc:"Heartfelt vow templates for both partners with customisation tips.",price:5},
  {cat:"document",icon:"🎤",name:"Speech Templates Pack",desc:"Best man, maid of honour, father of the bride — 3 polished speeches.",price:9},
  {cat:"document",icon:"📋",name:"Wedding Day Schedule",desc:"Hour-by-hour timeline template for the entire day.",price:5},
  {cat:"document",icon:"💍",name:"Engagement Announcement",desc:"Social media + printable announcement templates.",price:0},
  {cat:"document",icon:"🍽️",name:"Menu Card Designs",desc:"5 printable menu card templates in different styles.",price:7},
  {cat:"document",icon:"🎁",name:"Thank You Card Pack",desc:"10 thank you card designs ready to print.",price:7},
  {cat:"document",icon:"📝",name:"Vendor Contract Template",desc:"Professional contract template for booking wedding vendors.",price:9},
  {cat:"document",icon:"🏷️",name:"Place Card Templates",desc:"Elegant printable place cards in 6 styles.",price:5},
  {cat:"document",icon:"📔",name:"Wedding Day Emergency Kit",desc:"Printable checklist of every emergency item — pack &amp; go.",price:0}
];

function renderDownloads(filter) {
  var items = filter === "all" ? DOWNLOADS : DOWNLOADS.filter(function(d){return d.cat === filter});
  document.getElementById("grid").innerHTML = items.map(function(d){
    var price = d.price === 0
      ? '<span class="dl-price free">FREE</span>'
      : '<span class="dl-price">£'+d.price+'</span>';
    var btn = d.price === 0 ? "Download" : "Buy Now";
    return '<div class="dl-card"><div class="dl-prev">'+d.icon+'</div><div class="dl-info"><div class="dl-cat">'+(d.cat==="excel"?"Excel Automation":"Document Template")+'</div><div class="dl-name">'+d.name+'</div><div class="dl-desc">'+d.desc+'</div><div class="dl-bottom">'+price+'<button class="dl-btn" onclick=\'alert("Stripe checkout for downloads coming soon — admin can upload real files via the dashboard!")\'>'+btn+' →</button></div></div></div>';
  }).join('');
}

/* Get filter from URL */
var urlFilter = new URLSearchParams(location.search).get("cat") || "all";
if (!["all","excel","document"].includes(urlFilter)) urlFilter = "all";
renderDownloads(urlFilter);

document.querySelectorAll(".tab").forEach(function(tab){
  if (tab.dataset.filter === urlFilter) tab.classList.add("active");
  else tab.classList.remove("active");
  tab.addEventListener("click", function(){
    document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
    tab.classList.add("active");
    renderDownloads(tab.dataset.filter);
  });
});
</script>
</body>
</html>
