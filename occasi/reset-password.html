<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
<title>Reset Password — Occasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
h1{font-family:'Playfair Display',serif;font-size:24px;text-align:center;margin-bottom:6px;font-weight:700;line-height:1.1}
h1 em{font-style:italic;background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:13px;color:var(--ink2);text-align:center;margin-bottom:22px}
.submit{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.04em;box-shadow:0 6px 18px rgba(200,80,180,.3)}
.submit:hover{transform:translateY(-1px)}
</style>
</head>
<body>
<nav class="top-nav"><a href="index.html" class="brand-logo"><img src="assets/logo.png" alt="Occasi" style="height:32px;width:auto;display:block"><span class="logo-text">OCCASI</span></a></nav>
<div class="page-wrap"><div class="page-card" style="max-width:380px">
  <h1>Set new <em>password</em></h1>
  <p class="sub">Choose a strong password for your account.</p>
  <div class="field"><label>New Password</label><input type="password" id="np" placeholder="At least 8 characters"></div>
  <div class="field"><label>Confirm Password</label><input type="password" id="cp" placeholder="Repeat password"></div>
  <button class="submit" id="resetBtn">Update Password</button>
  <div class="msg" id="msg"></div>
</div></div>
<script src="js/occasi-ui.js"></script>
<script src="js/occasi-auth.js"></script>
<script>
function onSupabaseReady() {
  document.getElementById("resetBtn").addEventListener("click", async function(){
    var btn = this, np = document.getElementById("np").value, cp = document.getElementById("cp").value;
    if (np.length < 8) return showMsg("Password must be at least 8 characters.", true);
    if (np !== cp) return showMsg("Passwords don't match.", true);
    btn.disabled = true; btn.textContent = "Updating…";
    const { error } = await supabase.auth.updateUser({ password: np });
    btn.disabled = false; btn.textContent = "Update Password";
    if (error) return showMsg(error.message, true);
    showMsg("✓ Password updated! Redirecting…", false);
    setTimeout(function(){ window.location.href = "dashboard.html"; }, 1500);
  });
}
function showMsg(m, e) { var el = document.getElementById("msg"); el.textContent = m; el.className = "msg " + (e?"err":"ok"); }
</script>
</body>
</html>
